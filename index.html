<html lang="es">

    <script>(function(){try{var t=localStorage.getItem('geospeed_theme');if(t==='light'){document.documentElement.classList.add('light');document.documentElement.style.background='hsl(174,30%,94%)'}else{document.documentElement.style.background='#020202'}}catch(e){}})()</script>

    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e8f5f4" />

    <meta property="og:type" content="website" />
